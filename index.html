  </head>
  <body>
    <div id="root">
      <style>
        .preloader {
          position: fixed;
          top: 0; left: 0; right: 0; bottom: 0;
          background: #F2F2F2;
          display: flex;
          align-items: center;
          justify-content: center;
          z-index: 9999;
          font-family: 'Poppins', sans-serif;
        }
        .pokeball-spinner {
          width: 50px;
          height: 50px;
          border-radius: 50%;
          border: 4px solid #333;
          background: linear-gradient(to bottom, #EE1515 50%, white 50%);
          position: relative;
          animation: spin 1s infinite ease-in-out;
        }
        .pokeball-spinner::before {
          content: '';
          position: absolute;
          top: 50%; left: -4px; right: -4px;
          height: 4px;
          background: #333;
          transform: translateY(-50%);
        }
        .pokeball-spinner::after {
          content: '';
          position: absolute;
          top: 50%; left: 50%;
          width: 14px; height: 14px;
          background: white;
          border: 3px solid #333;
          border-radius: 50%;
          transform: translate(-50%, -50%);
        }
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
      <div class="preloader">
        <div class="pokeball-spinner"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
